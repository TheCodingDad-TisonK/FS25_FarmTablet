name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this request:**
        - Check the roadmap in the README — your idea may already be planned.
        - Check open issues to avoid duplicates.
        - Keep requests scoped and specific. "Improve the tablet" will be closed. "Add a dedicated crop calendar page showing planting and harvest windows" is actionable.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration this would address. Focus on the problem, not the solution.
      placeholder: "I have to switch between multiple UI panels to plan my week — it would be faster to have everything on one screen."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe what you want to happen. Be specific about the behavior, not just the concept.
      placeholder: "Add a summary dashboard page that shows today's weather, pending field tasks, and current finances at a glance."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of other ways to solve this? Why are they not good enough?
    validations:
      required: false

  - type: dropdown
    id: phase
    attributes:
      label: Which part of the mod does this relate to?
      options:
        - Tablet UI / Layout
        - Farm Overview Page
        - Field Management Page
        - Finance / Economy Page
        - Settings / Configuration
        - Multiplayer
        - Mod Compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, mockups, references to how other mods handle this, or any extra context.
    validations:
      required: false
